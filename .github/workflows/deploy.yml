name: Build and Deploy

on: 
  workflow_dispatch: 

permissions:
  contents: read
  security-events: write
  
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build image
        run: |
          docker build -t myapp:latest .

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}

      - name: Push to ACR
        run: |
          az acr login -n labdeployacrthomas
          docker tag myapp:latest labdeployacrthomas.azurecr.io/myapp:latest
          docker push labdeployacrthomas.azurecr.io/myapp:latest
          
      - name: Deploy to WebApp
        run: |
          az webapp config container set \
            -g RGLabDeploy-thomas \
            -n labdeploy-webapp-thomas \
            --container-image-name labdeployacrthomas.azurecr.io/myapp:latest \
            --container-registry-url https://labdeployacrthomas.azurecr.io \
            --container-registry-user "${{ secrets.ACR_USER }}" \
            --container-registry-password "${{ secrets.ACR_PWD }}"
